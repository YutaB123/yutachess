<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yutachess</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="home-body">

  <div class="bg-deco" aria-hidden="true">
    <span class="deco-piece" style="--x:6%;  --y:10%; --r:-15deg; --s:1.2; --d:0s">♜</span>
    <span class="deco-piece" style="--x:84%; --y:7%;  --r:12deg;  --s:0.9; --d:1.2s">♞</span>
    <span class="deco-piece" style="--x:3%;  --y:68%; --r:-8deg;  --s:1.1; --d:0.6s">♝</span>
    <span class="deco-piece" style="--x:87%; --y:62%; --r:20deg;  --s:1.3; --d:1.8s">♛</span>
    <span class="deco-piece" style="--x:14%; --y:87%; --r:-12deg; --s:0.8; --d:0.3s">♟</span>
    <span class="deco-piece" style="--x:76%; --y:84%; --r:6deg;   --s:1.0; --d:2.1s">♚</span>
    <span class="deco-piece" style="--x:91%; --y:36%; --r:-22deg; --s:0.7; --d:1.5s">♜</span>
    <span class="deco-piece" style="--x:1%;  --y:40%; --r:16deg;  --s:0.9; --d:0.9s">♞</span>
    <span class="deco-piece" style="--x:46%; --y:3%;  --r:-5deg;  --s:0.6; --d:2.4s">♝</span>
    <span class="deco-piece" style="--x:42%; --y:92%; --r:9deg;   --s:0.7; --d:1.1s">♟</span>
  </div>

  <div class="home-container">
    <div class="logo">♟</div>
    <h1 class="title">yutachess</h1>
    <p class="subtitle">Play chess with a friend online</p>

    <div class="home-actions">
      <a href="/game.html" class="btn btn-primary">Create Game</a>

      <div class="divider">or join a game</div>

      <div class="join-row">
        <input
          id="room-input"
          class="room-input"
          type="text"
          placeholder="Room code"
          maxlength="6"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn btn-secondary" id="join-btn">Join</button>
      </div>
      <p id="join-error" class="join-error hidden"></p>
    </div>

    <div class="home-features">
      <div class="feature"><span>⚡</span>Bullet · Blitz · Rapid</div>
      <div class="feature"><span>🔗</span>Share a link to invite</div>
      <div class="feature"><span>🔁</span>Rematch anytime</div>
    </div>
  </div>

  <script>
    const input  = document.getElementById('room-input');
    const joinBtn = document.getElementById('join-btn');
    const errEl  = document.getElementById('join-error');

    input.addEventListener('input', () => {
      input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      errEl.classList.add('hidden');
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') joinBtn.click();
    });

    joinBtn.addEventListener('click', () => {
      const code = input.value.trim();
      if (code.length < 4) {
        errEl.textContent = 'Please enter a valid room code.';
        errEl.classList.remove('hidden');
        return;
      }
      window.location.href = `/game.html?room=${code}`;
    });
  </script>
</body>
</html>
